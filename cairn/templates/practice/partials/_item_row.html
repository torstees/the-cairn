<tr id="item-row-{{ item.id }}"
    class="border-b border-stone-100 last:border-0 {% if item.completed %}opacity-50{% endif %}">
  <td class="py-3 px-4">
    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
      {% if item.item_type.value == 'warmup' %}bg-blue-100 text-blue-700
      {% elif item.item_type.value == 'learning' %}bg-amber-100 text-amber-800
      {% else %}bg-stone-100 text-stone-600{% endif %}">
      {{ item.item_type.label }}
    </span>
  </td>
  <td class="py-3 px-4 text-sm text-stone-800 font-medium">
    {% if item.warmup %}{{ item.warmup.title }}
    {% elif item.tune %}{{ item.tune.title }}
    {% else %}&mdash;{% endif %}
  </td>
  <td class="py-3 px-4 text-sm text-stone-500 text-right whitespace-nowrap">
    {{ item.minutes_allocated }} min
  </td>
  <td class="py-3 px-4 text-right">
    {% if item.completed %}
    <span class="text-green-600 text-sm font-medium">&#10003; Done</span>
    {% else %}
    <button hx-post="/practice/session/{{ session_id }}/item/{{ item.id }}/complete"
            hx-target="#item-row-{{ item.id }}"
            hx-swap="outerHTML"
            class="border border-stone-300 hover:bg-stone-50 text-stone-600 px-3 py-1 rounded text-xs font-medium">
      Mark Done
    </button>
    {% endif %}
  </td>
</tr>
