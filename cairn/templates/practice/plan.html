{% extends "base.html" %}
{% block title %}Plan a Session — The Cairn{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">

  <div class="mb-6">
    <a href="/" class="text-stone-500 hover:text-stone-700 text-sm">&larr; Home</a>
    <h1 class="text-3xl font-bold text-stone-800 mt-1">Plan a Practice Session</h1>
  </div>

  {% if not boxes %}
  <div class="bg-white rounded-lg shadow-sm p-8 text-center text-stone-500">
    <p class="mb-3">You don't have any tune boxes yet.</p>
    <a href="/boxes/new"
       class="inline-block bg-stone-700 hover:bg-stone-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
      Create a Box
    </a>
  </div>
  {% else %}
  <form method="post" action="/practice/plan" class="bg-white rounded-lg shadow-sm p-6 space-y-5"
        x-data="{
          boxId: {{ default_box_id }},
          listId: '{{ active_list.id if active_list else '' }}',
          prefs: {},
          saveAsDefault: false,
          get lists() { return (window.__cairnListsByBox || {})[String(this.boxId)] || []; },
          get selectedList() { return this.lists.find(l => l.id == this.listId) || null; },
          syncPrefs() {
            const l = this.selectedList;
            this.prefs = {
              warmup_pct: l ? l.warmup_pct : {{ default_warmup_pct }},
              review_pct: l ? l.review_pct : {{ default_review_pct }},
              learning_pct: l ? l.learning_pct : {{ default_learning_pct }},
              retention_pct: l ? l.retention_pct : {{ default_retention_pct }},
              learning_tune_count: l && l.learning_tune_count !== null ? l.learning_tune_count : '',
              review_tune_count: l && l.review_tune_count !== null ? l.review_tune_count : '',
              retention_tune_count: l && l.retention_tune_count !== null ? l.retention_tune_count : '',
            };
            this.saveAsDefault = false;
          }
        }"
        x-init="if (!lists.find(l => l.id == listId)) listId = ''; syncPrefs(); $watch('listId', () => syncPrefs())">

    <div>
      <label for="box_id" class="block text-sm font-medium text-stone-700 mb-1">Tune Box</label>
      <select id="box_id" name="box_id" required x-model.number="boxId"
              @change="if (!lists.find(l => l.id == listId)) listId = ''"
              class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        {% for box in boxes %}
        <option value="{{ box.id }}" {% if box.id == default_box_id %}selected{% endif %}>{{ box.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="list_id" class="block text-sm font-medium text-stone-700 mb-1">Active List</label>
      <select id="list_id" name="list_id" x-model="listId"
              class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        <option value="">— None —</option>
        <template x-for="l in lists" :key="l.id">
          <option :value="l.id" x-text="l.name + ' (' + l.type_label + ')'"></option>
        </template>
      </select>
    </div>

    <div x-show="listId !== ''" x-cloak class="border-t border-stone-100 pt-5 space-y-4">
      <h2 class="text-sm font-semibold text-stone-700">Session Shape</h2>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="warmup_pct" class="block text-xs font-medium text-stone-500 mb-1">Warmup %</label>
          <input id="warmup_pct" name="warmup_pct" type="number" min="0" max="100" :value="prefs.warmup_pct"
                 class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div>
          <label for="review_pct" class="block text-xs font-medium text-stone-500 mb-1">Review %</label>
          <input id="review_pct" name="review_pct" type="number" min="0" max="100" :value="prefs.review_pct"
                 class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div>
          <label for="learning_pct" class="block text-xs font-medium text-stone-500 mb-1">Learning %</label>
          <input id="learning_pct" name="learning_pct" type="number" min="0" max="100" :value="prefs.learning_pct"
                 class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div>
          <label for="retention_pct" class="block text-xs font-medium text-stone-500 mb-1">Retention %</label>
          <input id="retention_pct" name="retention_pct" type="number" min="0" max="100" :value="prefs.retention_pct"
                 class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div>
          <label for="learning_tune_count" class="block text-xs font-medium text-stone-500 mb-1">Max learning tunes</label>
          <input id="learning_tune_count" name="learning_tune_count" type="number" min="0" placeholder="Unlimited"
                 :value="prefs.learning_tune_count"
                 class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div>
          <label for="review_tune_count" class="block text-xs font-medium text-stone-500 mb-1">Max review tunes</label>
          <input id="review_tune_count" name="review_tune_count" type="number" min="0" placeholder="Unlimited"
                 :value="prefs.review_tune_count"
                 class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div>
          <label for="retention_tune_count" class="block text-xs font-medium text-stone-500 mb-1">Max retention tunes</label>
          <input id="retention_tune_count" name="retention_tune_count" type="number" min="0" placeholder="Unlimited"
                 :value="prefs.retention_tune_count"
                 class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
      </div>

      <label class="flex items-center gap-2 text-sm text-stone-600 cursor-pointer select-none">
        <input type="checkbox" name="save_as_default" value="true" x-model="saveAsDefault"
               class="rounded border-stone-300 text-stone-700 focus:ring-stone-400">
        Save as this list's default
      </label>
    </div>

    <div>
      <label for="total_minutes" class="block text-sm font-medium text-stone-700 mb-1">Session Length (minutes)</label>
      <input id="total_minutes" name="total_minutes" type="number" value="45" min="5" max="180" required
             class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
    </div>

    <button type="submit"
            class="w-full bg-stone-700 hover:bg-stone-600 text-white py-2.5 rounded-lg text-sm font-medium">
      Build Session Plan
    </button>
  </form>
  {% endif %}

</div>
{% endblock %}

{% block scripts %}
<script>
  window.__cairnListsByBox = {{ lists_by_box | tojson }};
</script>
{% endblock %}
