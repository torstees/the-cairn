<div id="activation-section" class="flex items-center gap-3">
  {% if practice_list.is_active %}
  <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-700">
    Active
  </span>
  <button hx-post="/lists/{{ practice_list.id }}/deactivate"
          hx-target="#activation-section"
          hx-swap="outerHTML"
          class="text-sm text-stone-500 hover:text-stone-700 border border-stone-300 rounded-lg px-3 py-1 hover:bg-stone-50">
    Deactivate
  </button>
  {% else %}
  <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-stone-100 text-stone-500">
    Inactive
  </span>
  <button hx-post="/lists/{{ practice_list.id }}/activate"
          hx-target="#activation-section"
          hx-swap="outerHTML"
          class="text-sm text-stone-600 hover:text-stone-800 border border-stone-300 rounded-lg px-3 py-1 hover:bg-stone-50">
    Set as Active
  </button>
  {% endif %}
</div>
