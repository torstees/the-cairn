<tr id="entry-row-{{ entry.tune_id }}"
    data-title="{{ entry.tune.title | lower }}"
    data-type="{{ entry.tune.tune_type.label | lower }}"
    data-tune-label="{{ entry.tune.title }} — {{ entry.tune.tune_type.label }} · {{ entry.tune.key_root.label }} {{ entry.tune.key_mode.label }}"
    data-tune-type="{{ entry.tune.tune_type.value }}"
    x-data="{
      remove() {
        const title = $el.querySelector('a').textContent;
        if (!confirm('Remove ' + title + ' from this list?')) return;
        window.dispatchEvent(new CustomEvent('cairn-tune-removed', {detail: {
          id: {{ entry.tune_id }},
          label: $el.dataset.tuneLabel,
          type: $el.dataset.tuneType,
        }}));
        htmx.ajax('DELETE', '/lists/{{ list_id }}/tunes/{{ entry.tune_id }}', {target: $el, swap: 'delete'});
      }
    }"
    class="border-b border-stone-100 hover:bg-stone-50">
  <td class="py-3 px-4 text-stone-800">
    <a href="/tunes/{{ entry.tune.id }}?list_id={{ list_id }}" class="font-medium hover:underline"
       {% if entry.tune.id in tune_previews %}data-abc-preview-id="{{ entry.tune.id }}"{% endif %}>{{ entry.tune.title }}</a>
    {% if entry.tune.id in tune_previews %}
    <template id="tune-abc-preview-{{ entry.tune.id }}">{{ tune_previews[entry.tune.id] }}</template>
    {% endif %}
    <p class="text-xs text-stone-400 mt-0.5">{{ entry.tune.key_root.label }} {{ entry.tune.key_mode.label }}</p>
  </td>
  <td class="py-3 px-4 text-sm text-stone-500 whitespace-nowrap">{{ entry.tune.tune_type.label }}</td>
  <td class="py-3 px-4">
    {% set non_core = entry.tune.settings | selectattr('is_core', 'false') | list %}
    {% if non_core %}
    <select name="setting_id"
            hx-post="/lists/{{ list_id }}/tunes/{{ entry.tune_id }}/setting"
            hx-target="#entry-row-{{ entry.tune_id }}"
            hx-swap="outerHTML"
            hx-trigger="change"
            class="text-sm border border-stone-200 rounded px-2 py-1 bg-white text-stone-700 focus:outline-none focus:ring-2 focus:ring-stone-400">
      <option value="">Core setting</option>
      {% for s in entry.tune.settings %}
      {% if not s.is_core %}
      <option value="{{ s.id }}" {% if entry.setting_id == s.id %}selected{% endif %}>
        {{ s.label }}{% if s.instrument %} ({{ s.instrument.label }}){% endif %}
      </option>
      {% endif %}
      {% endfor %}
    </select>
    {% else %}
    <span class="text-xs text-stone-400">—</span>
    {% endif %}
  </td>
  <td class="py-3 px-4 text-right">
    <button @click="remove()"
            class="text-xs text-red-600 hover:text-red-800 font-medium px-2 py-1 rounded hover:bg-red-50">
      Remove
    </button>
  </td>
</tr>
