{% extends "base.html" %}
{% block title %}New Tune Box — The Cairn{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/boxes" class="text-stone-500 hover:text-stone-700 text-sm">&larr; Boxes</a>
    <h1 class="text-3xl font-bold text-stone-800">New Tune Box</h1>
  </div>

  <form method="POST" action="/boxes" class="bg-white rounded-lg shadow-sm p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium text-stone-700 mb-1" for="name">Name</label>
      <input id="name" name="name" type="text" required
             value="{{ name if name else '' }}"
             placeholder="e.g. Flute &amp; Whistle, Fiddle"
             class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-stone-400">
    </div>

    <div>
      <fieldset>
        <legend class="block text-sm font-medium text-stone-700 mb-2">Instruments</legend>
        <div class="grid grid-cols-2 gap-y-2 gap-x-4">
          {% for instrument in instruments %}
          <label class="flex items-center gap-2 text-sm text-stone-700 cursor-pointer select-none py-1">
            <input type="checkbox" name="instruments" value="{{ instrument.value }}"
                   class="rounded border-stone-300 accent-stone-700 w-4 h-4">
            {{ instrument.label }}
          </label>
          {% endfor %}
        </div>
        {% if error %}
        <p class="text-sm text-red-600 mt-2">{{ error }}</p>
        {% endif %}
      </fieldset>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-stone-700 hover:bg-stone-600 text-white px-5 py-2 rounded-lg font-medium">
        Create Box
      </button>
      <a href="/boxes"
         class="px-5 py-2 rounded-lg border border-stone-300 text-stone-600 hover:bg-stone-50 font-medium">
        Cancel
      </a>
    </div>

  </form>
</div>
{% endblock %}
