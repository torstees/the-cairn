<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}The Cairn{% endblock %}</title>
  <!-- Tailwind CSS v3.4.16 -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- HTMX v2.0.4 -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <!-- Alpine.js v3.14.9 -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    .abcjs-cursor-active path,
    .abcjs-cursor-active rect,
    .abcjs-cursor-active polygon,
    .abcjs-cursor-active ellipse,
    .abcjs-cursor-active circle { fill: cornflowerblue !important; stroke: cornflowerblue !important; }
  </style>
  <!-- abcjs v6.4.4 -->
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen" x-data="cairnApp()">

  <!-- Page content shifts left when tuner opens -->
  <div :style="{ marginRight: tunerOpen ? '20rem' : '0', transition: 'margin-right 0.3s ease' }">
    <nav class="bg-stone-800 text-stone-100 px-6 py-3 flex items-center gap-6">
      <span class="font-semibold tracking-wide">The Cairn</span>
      <a href="/" class="hover:text-stone-300 text-sm">Home</a>
      <a href="/tunes" class="hover:text-stone-300 text-sm">Tunes</a>
      <a href="/progress" class="hover:text-stone-300 text-sm">Progress</a>
      <a href="/boxes" class="hover:text-stone-300 text-sm">Boxes</a>
      <a href="/lists" class="hover:text-stone-300 text-sm">Lists</a>
      <a href="/practice/plan" class="hover:text-stone-300 text-sm">Practice</a>
      <a href="/warmups" class="hover:text-stone-300 text-sm">Warmups</a>
      <a href="/sets" class="hover:text-stone-300 text-sm">Sets</a>
      <button @click="toggleTuner()"
              :class="tunerOpen ? 'text-white border-stone-400' : 'text-stone-300 border-stone-600'"
              class="ml-auto text-sm font-medium px-3 py-1 rounded border hover:text-white hover:border-stone-400 transition-colors">
        &#119070; Tuner
      </button>
    </nav>
    <main class="container mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/js/app.js?v=20"></script>
  {% block scripts %}{% endblock %}

  <!-- Tuner drawer — fixed panel, no backdrop so page content stays readable -->
  <div x-show="tunerOpen"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="translate-x-full"
       class="fixed top-0 right-0 h-full w-80 bg-white border-l border-stone-200 shadow-xl z-50 flex flex-col"
       x-cloak>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-stone-200 shrink-0">
      <span class="font-semibold text-stone-800 text-lg">Tuner</span>
      <button @click="closeTuner()"
              class="text-stone-400 hover:text-stone-700 text-xl leading-none px-1">&#10005;</button>
    </div>

    <!-- Body -->
    <div class="flex-1 flex flex-col items-center justify-center gap-6 p-6">

      <!-- Note + accidental -->
      <div class="flex items-start justify-center gap-1 h-28">
        <span id="tuner-note"
              class="text-9xl font-bold text-stone-800 leading-none tracking-tight select-none">—</span>
        <span id="tuner-accidental"
              class="text-4xl text-stone-500 mt-3 w-7 select-none"></span>
      </div>

      <!-- Cents bar -->
      <div class="w-full">
        <div class="flex justify-between text-xs text-stone-400 mb-1 px-0.5">
          <span>&#9837; &minus;50¢</span>
          <span>+50¢ &#9839;</span>
        </div>
        <div class="relative h-5 bg-stone-100 rounded-full overflow-hidden">
          <!-- Center line -->
          <div class="absolute inset-y-0 left-1/2 w-px bg-stone-300 -translate-x-1/2"></div>
          <!-- Needle -->
          <div id="tuner-needle"
               class="absolute top-1 bottom-1 w-1 rounded-full bg-stone-400"
               style="left: calc(50% - 2px)"></div>
        </div>
        <p id="tuner-cents" class="text-center text-sm text-stone-500 mt-1 select-none">—</p>
      </div>

      <!-- A4 reference -->
      <div class="flex items-center gap-2">
        <label for="tuner-a4" class="text-sm text-stone-500 select-none">A4</label>
        <input id="tuner-a4" type="number" min="400" max="480" value="440" step="1"
               class="w-20 border border-stone-300 rounded px-2 py-1 text-sm text-center
                      focus:outline-none focus:ring-1 focus:ring-stone-400">
        <span class="text-sm text-stone-400">Hz</span>
      </div>

      <!-- Status / error -->
      <p id="tuner-status" class="text-sm text-stone-400 text-center select-none">Tap to start</p>
      <p id="tuner-error"
         class="hidden text-sm text-red-500 text-center px-2 leading-snug"></p>

      <!-- Toggle button -->
      <button id="tuner-toggle"
              onclick="window.tunerToggle()"
              class="px-6 py-2 rounded-lg bg-stone-700 hover:bg-stone-600 text-white text-sm font-medium transition-colors">
        Start listening
      </button>

    </div>
  </div>

</body>
</html>
