<div class="cairn-modal-backdrop fixed inset-0 bg-black/50 z-50 flex items-center justify-center"
     onclick="if(event.target===this)closeTheSessionWizard()">
  <div class="bg-white rounded-lg shadow-xl p-6 max-w-lg mx-4 w-full max-h-[85vh] flex flex-col">
    <div class="flex items-center justify-between mb-4 shrink-0">
      <h3 class="text-lg font-semibold text-stone-800">Link to TheSession.org &mdash; Step 3 of 4</h3>
      <button type="button" onclick="closeTheSessionWizard()" class="text-stone-400 hover:text-stone-600 text-xl leading-none">&times;</button>
    </div>

    <form hx-post="/tunes/{{ tune_id }}/thesession-tune/{{ external_tune_id }}/confirm"
          hx-target="#thesession-wizard" hx-swap="innerHTML" class="flex flex-col min-h-0 flex-1">
      {% for aid in alias_ids %}<input type="hidden" name="alias_ids" value="{{ aid }}">{% endfor %}

      <p class="text-sm text-stone-600 mb-2 shrink-0">Choose which settings (notations) to import.</p>

      {% if settings %}
      <div class="overflow-y-auto flex-1 -mx-1 px-1 space-y-3">
        {% for setting in settings %}
        <label class="block border border-stone-200 rounded-lg px-3 py-2 cursor-pointer select-none">
          <div class="flex items-center gap-2 mb-1">
            <input type="checkbox" name="setting_ids" value="{{ setting.id }}"
                   class="rounded border-stone-300 text-stone-700 focus:ring-stone-400">
            <span class="text-sm font-medium text-stone-700">
              #{{ setting.setting_id }} by {{ setting.username or "unknown" }}
            </span>
          </div>
          <pre class="ml-6"><code class="language-abc">{{ previews[setting.id] }}</code></pre>
        </label>
        {% endfor %}
      </div>
      {% else %}
      <p class="text-sm text-stone-500 py-6 text-center flex-1">No settings found on TheSession.org for this tune.</p>
      {% endif %}

      <div class="flex items-center justify-between mt-4 shrink-0">
        <button type="button"
                hx-get="/tunes/{{ tune_id }}/thesession-tune/{{ external_tune_id }}"
                hx-target="#thesession-wizard" hx-swap="innerHTML"
                class="px-4 py-2 text-sm font-medium text-stone-600 border border-stone-300 rounded-lg hover:bg-stone-50">
          &larr; Back
        </button>
        <button type="submit"
                class="px-4 py-2 text-sm font-medium text-white bg-stone-700 rounded-lg hover:bg-stone-600">
          Next &rarr;
        </button>
      </div>
    </form>
  </div>
</div>
