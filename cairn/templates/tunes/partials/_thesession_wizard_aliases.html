<div class="cairn-modal-backdrop fixed inset-0 bg-black/50 z-50 flex items-center justify-center"
     onclick="if(event.target===this)closeTheSessionWizard()">
  <div class="bg-white rounded-lg shadow-xl p-6 max-w-lg mx-4 w-full max-h-[85vh] flex flex-col">
    <div class="flex items-center justify-between mb-4 shrink-0">
      <h3 class="text-lg font-semibold text-stone-800">Link to TheSession.org &mdash; Step 2 of 4</h3>
      <button type="button" onclick="closeTheSessionWizard()" class="text-stone-400 hover:text-stone-600 text-xl leading-none">&times;</button>
    </div>

    <form hx-post="/tunes/{{ tune_id }}/thesession-tune/{{ external_tune_id }}/settings"
          hx-target="#thesession-wizard" hx-swap="innerHTML" class="flex flex-col min-h-0 flex-1">
      <input type="hidden" name="box_id" value="{{ box_id }}">
      <input type="hidden" name="list_id" value="{{ list_id }}">
      <p class="text-sm text-stone-600 mb-2 shrink-0">Choose which alternate titles to import as aliases.</p>

      {% if aliases %}
      <div class="flex gap-3 mb-2 shrink-0">
        <button type="button" onclick="document.querySelectorAll('.thesession-alias-cb').forEach(function(cb){cb.checked=true;})"
                class="text-xs text-stone-500 hover:text-stone-700 underline">Check All</button>
        <button type="button" onclick="document.querySelectorAll('.thesession-alias-cb').forEach(function(cb){cb.checked=false;})"
                class="text-xs text-stone-500 hover:text-stone-700 underline">Uncheck All</button>
      </div>
      <div class="overflow-y-auto flex-1 -mx-1 px-1 space-y-1.5">
        {% for alias in aliases %}
        <label class="flex items-center gap-2 text-sm text-stone-700 cursor-pointer select-none">
          <input type="checkbox" name="alias_ids" value="{{ alias.id }}"
                 {% if alias.alias.strip().lower() not in existing_names %}checked{% endif %}
                 class="thesession-alias-cb rounded border-stone-300 text-stone-700 focus:ring-stone-400">
          {{ alias.alias }}
          {% if alias.alias.strip().lower() in existing_names %}
          <span class="text-xs text-stone-400">(already on this tune)</span>
          {% endif %}
        </label>
        {% endfor %}
      </div>
      {% else %}
      <p class="text-sm text-stone-500 py-6 text-center flex-1">No alternate titles on TheSession.org for this tune.</p>
      {% endif %}

      <div class="flex items-center justify-between mt-4 shrink-0">
        <button type="button"
                hx-get="/tunes/{{ tune_id }}/thesession-search"
                hx-include="[name='box_id'], [name='list_id']"
                hx-target="#thesession-wizard" hx-swap="innerHTML"
                class="px-4 py-2 text-sm font-medium text-stone-600 border border-stone-300 rounded-lg hover:bg-stone-50">
          &larr; Back
        </button>
        <button type="submit"
                class="px-4 py-2 text-sm font-medium text-white bg-stone-700 rounded-lg hover:bg-stone-600">
          Next &rarr;
        </button>
      </div>
    </form>
  </div>
</div>
